<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jejak Banyuwangi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward" />
</head>

<script src="script3.js"></script>

<body class="font-montserrat">
    <!--Navigation Bar-->
    <header class="w-full flex justify-center"> 
        <nav class="flex justify-between items-center w-[92%] py-2 border-b-2 z-50">
            <!--Logo Image-->
            <div class="w-[387px]">
                <a href="index.html">
                    <img src="Image_Assets/Logo.png" alt="Logo">
                </a>
            </div>

            <!--Nav Buttons-->
            <div>
                <ul class="flex items-center gap-[6vw] font-bold text-xl text-white">
                    <li>
                        <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="index.html">Home</a>
                    </li>
                    <li>
                        <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="PackagesMenu.html">Packages</a>
                    </li>
                    <li>
                        <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" onclick="location.href='index.html#explore'">Explore</a>
                    </li> 
                    <li>
                        <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" onclick="location.href='index.html#about'">About</a>
                    </li>
                </ul>
            </div>
            
            <!--Get Started / Sign In Button-->
            <div class="w-[200px] flex justify-end">
                <div class="p-[2px] rounded-full" style="background: linear-gradient(to right, #4CB7FF, #FFFFFF, #EFEB6C)">
                    <button onclick="location.href='Login.html'" class="bg-white font-bold text-xl rounded-full w-[182px] h-[48px] cursor-pointer transform hover:scale-110 duration-300">
                        Get Started
                    </button>
                </div>
            </div>
        </nav>
    </header>    

    <div class="flex items-start gap-10 mt-8 ml-20">
        <!-- Glass search box -->
        <div class="glass-card rounded-2xl p-8 w-[420px] h-[350px] flex flex-col gap-5 bg-white/10 backdrop-blur-sm border border-white/20 shrink-0">
            <div class="flex flex-col gap-1.5">
                <label class="text-white font-semibold">Pilih Destinasi</label>
                <select class="w-full h-[50px] appearance-none rounded-lg px-3 py-2 text-sm text-white/60 bg-white/10 backdrop-blur-sm border border-white/20 focus:outline-none focus:ring-2 focus:ring-teal-400 cursor-pointer">
                    <option class="text-black" disabled selected>Pilih Destinasi</option>
                    <option class="text-black" value="kawah-ijen">Kawah Ijen</option>
                    <option class="text-black" value="green-island">Green Island</option>
                </select>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-white font-semibold">Pilih Check In Date</label>
                <input type="date" class="w-full h-[50px] rounded-lg px-3 py-2 text-sm text-white/60 bg-white/10 backdrop-blur-sm border border-white/20 focus:outline-none focus:ring-2 focus:ring-teal-400 cursor-pointer">
            </div>

            <button class="w-full h-[60px] bg-black text-white font-bold rounded-lg hover:bg-white hover:text-black transition text-sm mt-2">
                Cari Paket
            </button>
        </div>

        <div class="flex flex-col gap-3">
            <ul class="list-none p-0 m-0 w-[1290px]">

                <!-- Card 1 -->
                <li class="card-item">
                    <div class="block no-underline rounded-2xl overflow-hidden bg-white/20 backdrop-blur-sm border border-white/20">
                        <img src="Image_Assets/Explore_KawahIjen.png"
                             alt="Kawah Ijen"
                             class="w-full h-[650px] object-cover block">
                        <div class="flex flex-col gap-1.5 p-4">
                            <span class="inline-block bg-white/20 border border-white/30 text-white text-l font-bold px-3 py-1 rounded-xl w-fit">
                                Kawah Ijen
                            </span>
                            <p class="text-white text-sm leading-relaxed line-clamp-3 m-0">
                                Saksikan keindahan api biru yang memukau dan kawah belerang raksasa di puncak gunung berapi aktif Banyuwangi.
                            </p>
                            <div class="flex flex-col gap-1.5 mt-1 items-center">
                                <a href="transaksi.html">
                                    <button class="w-[150px] h-[40px] mx-auto mt-2 px-5 py-2 bg-white/20 border border-white/30 text-white font-bold rounded-2xl hover:border-blue-400/70 hover:text-blue-400 transition text-sm">
                                        Book Now
                                    </button>
                                </a>
                            </div>
                        </div>
                    </div>
                </li>

                <!-- Card 2 -->
                <li class="card-item">
                    <div class="block no-underline rounded-2xl overflow-hidden bg-white/10 backdrop-blur-sm border border-white/20">
                        <img src="Image_Assets/Explore_PulauMerah.png"
                             alt="Green Island"
                             class="w-full h-[650px] object-cover block">
                        <div class="flex flex-col gap-1.5 p-4">
                            <span class="inline-block bg-white/20 border border-white/30 text-white text-l font-bold px-3 py-1 rounded-xl w-fit">
                                Pulau Merah 
                            </span>
                            <p class="text-white text-sm leading-relaxed line-clamp-3 m-0">
                                Pulau kecil tersembunyi dengan pantai berpasir putih dan air laut jernih berwarna toska yang memesona.
                            </p>
                            <div class="flex flex-col gap-1.5 mt-1 items-center">
                                <a href="transaksi.html">
                                    <button class="w-[150px] h-[40px] mx-auto mt-2 px-5 py-2 bg-white/20 border border-white/30 text-white font-bold rounded-2xl hover:border-blue-400/70 hover:text-blue-400 transition text-sm">
                                        Book Now
                                    </button>
                                </a>
                            </div>
                        </div>
                    </div>
                </li>

            </ul>

            <!-- Prev / Next buttons -->
            <div class="flex justify-center gap-3">
                <button onclick="changeCard(-1)"
                        class="w-11 h-11 rounded-xl bg-white/10 backdrop-blur-sm border border-white/20 text-white text-lg font-bold cursor-pointer hover:bg-white/30 transition flex items-center justify-center">
                    &#8592;
                </button>
                <button onclick="changeCard(1)"
                        class="w-11 h-11 rounded-xl bg-white/10 backdrop-blur-sm border border-white/20 text-white text-lg font-bold cursor-pointer hover:bg-white/30 transition flex items-center justify-center">
                    &#8594;
                </button>
            </div>
        </div>
    </div>

</body>
</html>
