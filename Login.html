<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jejak Banyuwangi</title>
    <link rel="stylesheet" href="style2.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<script src="script2.js"></script>

<body class="font-[Montserrat]" >

            <!--Navigation Bar-->
            <header class="w-full flex justify-center"> 
                <nav class="flex justify-between items-center w-[92%] py-2 border-b-2 z-50">
                    <!--Logo Image-->
                    <div class="w-[387px]">
                        <a href="index.html">
                            <img src="Image_Assets/Logo.png" alt="Logo">
                        </a>
                    </div>

                    <!--Nav Buttons-->
                    <div>
                        <ul class="flex items-center gap-[6vw] font-bold text-xl text-white">
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="index.html">Home</a>
                            </li>
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="packages.html">Packages</a>
                            </li>
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="explore.html">Explore</a>
                            </li> 
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="about.html">About</a>
                            </li>
                        </ul>
                    </div>
                    
                    <!--Get Started / Sign In Button-->
                    <div class="w-[200px] flex justify-end">
                        <div class="p-[2px] rounded-full" style="background: linear-gradient(to right, #4CB7FF, #FFFFFF, #EFEB6C)">
                            <button onclick="location.href='Login.html'" class="bg-white font-bold text-xl rounded-full w-[182px] h-[48px] cursor-pointer transform hover:scale-110 duration-300">
                                Get Started
                            </button>
                        </div>
                    </div>
                </nav>
            </header>

             <main class="flex items-center justify-between w-[80%] mx-auto min-h-[calc(100vh-80px)]">

                <!-- LEFT: Login card -->
                <div class="glass-card p-8 w-[480px] h-[600px] flex flex-col gap-5">

                    <!-- Logo + tagline -->
                    <div class="flex items-center gap-2">
                        <span class="text-white text-2xl font-semibold">Explore More, Experience Life.</span>
                    </div>

                    <!-- Sign Up / Log In toggle -->
                    <div class="flex rounded-lg overflow-hidden border border-white/20">
                        <button id="signupBtn" onclick="location.href='signup.html'"
                            class="flex-1 py-2.5 text-sm font-bold transition bg-white text-black">
                            Sign Up
                    </button>
                        <button id="loginBtn" onclick="location.href='Login.html'"
                            class="flex-1 py-2.5 text-sm font-bold transition bg-transparent text-white">
                            Log In
                        </button>
                    </div>

                    <!-- Social login -->
                    <div>
                        <p class="text-white/50 text-xs mb-3">Log In with Open account</p>
                        <div class="flex gap-4">
                            <!-- Apple -->
                            <div class="social-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                            </div>
                            <!-- Google -->
                            <div class="social-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            </div>
                            <!-- Facebook -->
                            <div class="social-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="divider">or</div>

                    <!-- Form fields -->
                    <div class="flex flex-col gap-3">
                        <input type="text" placeholder="Username" class="input-field">
                        <div class="relative">
                            <input type="password" id="passwordInput" placeholder="Password" class="input-field pr-10">
                            <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-white">
                                <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Remember me + Forgot password -->
                    <div class="flex justify-between items-center text-xs text-white/60">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-3 h-3">
                            Remember me
                        </label>
                        <a href="#" class="hover:text-white transition">Forgot Password ?</a>
                    </div>

                    <!-- Log In button -->
                    <button class="w-full bg-black text-white font-bold py-3 rounded-lg hover:bg-white hover:text-black transition text-sm">
                        Log In
                    </button>

                </div>

                <!-- RIGHT: Big headline -->
                <div class="flex flex-col gap-4 max-w-[55%]">
                    <h1 class="text-white font-black leading-none" style="font-size: clamp(3.5rem, 7vw, 7rem);">
                        Experience a<br>Breathtaking<br>Adventure
                    </h1>
                </div>

            </main>

    </body>
    
</html>
