<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jejak Banyuwangi - Transaksi</title>
  <link rel="stylesheet" href="style4.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-[Montserrat] transaksi-page">
  <!--Navigation Bar-->
            <header class="w-full flex justify-center"> 
                <nav class="flex justify-between items-center w-[92%] py-2 border-b-2 z-50">
                    <!--Logo Image-->
                    <div class="w-[387px]">
                        <a href="index.html">
                            <img src="Image_Assets/Logo.png" alt="Logo">
                        </a>
                    </div>

                    <!--Nav Buttons-->
                    <div>
                        <ul class="flex items-center gap-[6vw] font-bold text-xl text-white">
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="index.html">Home</a>
                            </li>
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="packages.html">Packages</a>
                            </li>
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="explore.html">Explore</a>
                            </li> 
                            <li>
                                <a class="border-b-2 border-transparent hover:border-white transition-all duration-300 pb-2" href="about.html">About</a>
                            </li>
                        </ul>
                    </div>
                    
                    <!--Get Started / Sign In Button-->
                    <div class="w-[200px] flex justify-end">
                        <div class="p-[2px] rounded-full" style="background: linear-gradient(to right, #4CB7FF, #FFFFFF, #EFEB6C)">
                            <button onclick="location.href='Login.html'" class="bg-white font-bold text-xl text-black rounded-full w-[182px] h-[48px] cursor-pointer transform hover:scale-110 duration-300">
                                Get Started
                            </button>
                        </div>
                    </div>
                </nav>
            </header>

            <section class="transaction-section">
              <div class="transaction-content">
                <h1 class="transaction-title">Booking Details</h1>

                <div class="transaction-grid">
                  <!-- LEFT -->
                  <div class="left-column">
                    <div class="glass-box customer-box">
                      <h2 class="box-title">Customer Details</h2>

                      <div class="form-grid">
                        <div class="input-wrap">
                          <label>First Name *</label>
                          <input type="text" placeholder="Indah" />
                        </div>

                        <div class="input-wrap">
                          <label>Last Name *</label>
                          <input type="text" placeholder="Novela" />
                        </div>

                        <div class="input-wrap">
                          <label>Email *</label>
                          <input type="email" placeholder="123456@gmail.com" />
                        </div>

                        <div class="input-wrap">
                          <label>Phone Number *</label>
                          <input type="text" placeholder="089123456789" />
                        </div>
                      </div>
                    </div>

                    <div class="glass-box payment-box">
                      <h2 class="box-title">Payment Methode</h2>

                      <div class="payment-list">
                        <label class="payment-item">
                          <div class="payment-left">
                            <div class="bank-logo bank-bca">BCA</div>
                          </div>
                          <input type="radio" name="payment" />
                          <span class="custom-radio"></span>
                        </label>

                        <label class="payment-item">
                          <div class="payment-left">
                            <div class="bank-logo bank-mandiri">mandiri</div>
                          </div>
                          <input type="radio" name="payment" />
                          <span class="custom-radio"></span>
                        </label>

                        <label class="payment-item">
                          <div class="payment-left">
                            <div class="bank-logo bank-briva">BRIVA</div>
                          </div>
                          <input type="radio" name="payment" />
                          <span class="custom-radio"></span>
                        </label>
                      </div>

                      <button class="view-all-btn">
                        View all
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                          <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </button>
                    </div>
                  </div>

                  <!-- RIGHT -->
                  <div class="right-column">
                    <div class="glass-box trip-box">
                      <h2 class="box-title">Your Trip</h2>

                      <div class="trip-item">
                        <img src="Image_Assets/Ijen_card.webp" alt="Kawah Ijen" class="trip-image" />

                        <div class="trip-info">
                          <h3>Kawah Ijen</h3>
                          <p>Desa Tamansari, Kabupaten Banyuwangi</p>
                          <span>Rp500.000,-</span>
                        </div>

                        <div class="trip-actions">
                          <div class="qty-select">
                            <span>2</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                              <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                          </div>

                          <button class="delete-btn" aria-label="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                              <path d="M3 6H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                              <path d="M8 6V4C8 3.44772 8.44772 3 9 3H15C15.5523 3 16 3.44772 16 4V6" stroke="currentColor" stroke-width="1.8"/>
                              <path d="M19 6L18.133 18.142C18.0578 19.1949 17.1819 20 16.1263 20H7.87368C6.81815 20 5.94218 19.1949 5.86698 18.142L5 6" stroke="currentColor" stroke-width="1.8"/>
                              <path d="M10 11V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                              <path d="M14 11V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                          </button>
                        </div>
                      </div>

                      <div class="discount-area">
                        <label>Discount Code</label>
                        <input type="text" />
                        <button class="apply-btn">Apply</button>
                      </div>

                      <div class="summary-box">
                        <div class="summary-row">
                          <span>Subtotal</span>
                          <strong>Rp500.000,-</strong>
                        </div>

                        <div class="summary-row">
                          <span>Taxes</span>
                          <strong>Rp55.000,-</strong>
                        </div>

                        <div class="summary-row">
                          <span>Discount</span>
                          <strong>Rp70.000,-</strong>
                        </div>

                        <div class="summary-row total-row">
                          <span>Total</span>
                          <strong>Rp485.000,-</strong>
                        </div>

                        <button class="checkout-btn">Checkout</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
</body>
</html>
