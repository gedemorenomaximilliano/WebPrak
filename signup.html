                <input type="email" id="emailInput" placeholder="Email" class="input-field pl-9">
            </div>
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>

            </div>
            <div class="relative">

                <button onclick="togglePassword('passwordInput','eye1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition">
                    <svg id="eye1" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <div id="strengthWrap" class="hidden">
                <div class="flex gap-1 mb-1">
                    <div id="s1" class="strength-bar flex-1 bg-white/10 h-1 rounded"></div>
                    <div id="s2" class="strength-bar flex-1 bg-white/10 h-1 rounded"></div>
                    <div id="s3" class="strength-bar flex-1 bg-white/10 h-1 rounded"></div>
                    <div id="s4" class="strength-bar flex-1 bg-white/10 h-1 rounded"></div>
                </div>
                <p id="strengthLabel" class="text-xs text-white/40"></p>
            </div>
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
                <input type="password" id="confirmInput" placeholder="Confirm Password" class="input-field pl-9 pr-10" oninput="checkMatch()">
                <button onclick="togglePassword('confirmInput','eye2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition">
                    <svg id="eye2" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

        </div>

        </label>

        <!-- Submit — same black button style as Login -->
        <button onclick="handleSignup()" class="w-full bg-black text-white font-bold py-3 rounded-lg hover:bg-white hover:text-black transition text-sm">
            Create Account
        </button>

        <p class="text-center text-xs text-white/50">
            Already have an account?
            <a href="Login.html" class="text-[#4CB7FF] font-semibold hover:underline ml-1">Log In</a>
        </p>
    </div>

    <!-- RIGHT: Hero — same font size as Login -->
    <div class="flex flex-col gap-4 max-w-[55%]">
        <h1 class="text-white font-black leading-none" style="font-size: clamp(3.5rem, 7vw, 7rem);">
            Experience a<br>Breathtaking<br>Adventure
        </h1>
    </div>
</main>

<script>
    function togglePassword(inputId, iconId) {
        const inp = document.getElementById(inputId);
        const isHidden = inp.type === 'password';
        inp.type = isHidden ? 'text' : 'password';
        document.getElementById(iconId).innerHTML = isHidden
            ? '<path d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-8-11-8a18 18 0 0 1 5.06-5.94M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
    function checkStrength(val) {
        const wrap = document.getElementById('strengthWrap');
        const label = document.getElementById('strengthLabel');
        const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
        if (!val) { wrap.classList.add('hidden'); return; }
        wrap.classList.remove('hidden');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
        const labels = ['Weak','Fair','Good','Strong'];
        bars.forEach((b,i) => { b.style.background = i < score ? colors[score-1] : 'rgba(255,255,255,0.1)'; });
        label.textContent = labels[score-1] || '';
        label.style.color = colors[score-1] || 'rgba(255,255,255,0.4)';
    }
    function checkMatch() {
        const pwd = document.getElementById('passwordInput').value;
        const conf = document.getElementById('confirmInput').value;
        const msg = document.getElementById('matchMsg');
        if (!conf) { msg.classList.add('hidden'); return; }
        msg.classList.remove('hidden');
        if (pwd === conf) { msg.textContent = '✓ Passwords match'; msg.style.color = '#22c55e'; }
        else { msg.textContent = '✗ Passwords do not match'; msg.style.color = '#ef4444'; }
    }
    function handleSignup() {
        const email = document.getElementById('emailInput').value.trim();
        const username = document.getElementById('usernameInput').value.trim();
        const pwd = document.getElementById('passwordInput').value;
        const conf = document.getElementById('confirmInput').value;
        const agree = document.getElementById('agreeCheck').checked;
        if (!email || !username || !pwd || !conf) { alert('Please fill in all fields.'); return; }
        if (pwd !== conf) { alert('Passwords do not match.'); return; }
        if (!agree) { alert('Please agree to the Terms of Service.'); return; }
        alert('Account created! Redirecting to login...');
    }
</script>
</body>
